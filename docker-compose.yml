services:
  postgres:
    image: postgres:16-alpine
    container_name: apollo-postgres
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  opencode:
    build:
      context: ./backend
      dockerfile: dockerfiles/ai.Dockerfile
    container_name: apollo-opencode
    command: opencode serve --hostname 0.0.0.0 --port 3000
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-}
    volumes:
      - ./backend/ai-workspace:/workspace
      - ${HOME}/.config/opencode:/home/agent/.config/opencode
      - ${HOME}/.local/share/opencode:/home/agent/.local/share/opencode
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apollo-backend
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      opencode:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      NODE_OPTIONS: --max-old-space-size=4096
      DATABASE_URL: postgres://app:app@postgres:5432/app
      OUTPUT_ROOT: /app/data/output-docker
      ANALYZE_SCRIPT_DIR: /app/analyzer-bot
      OPENCODE_SERVER_URL: http://opencode:3000
      ANALYZER_NODE_OPTIONS: --max-old-space-size=4096
    ports:
      - "3000:3000"
    volumes:
      - ./backend/data/output-docker:/app/data/output-docker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apollo-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
